<section id="content-section">
  <mat-toolbar>
    <mat-toolbar-row>
      <a matButton="filled" routerLink="/" routerLinkActive="active" #homeBtn="routerLinkActive" class="primary"
        [class.mat-mdc-filled-button]="homeBtn.isActive" [class.mat-mdc-raised-button]="!homeBtn.isActive"
        [routerLinkActiveOptions]="{exact: true}">
        <mat-icon>home</mat-icon>
        Início
      </a>
      <a matButton="filled" routerLink="/agendamento" routerLinkActive="active" #listBtn="routerLinkActive"
        class="primary" [class.mat-mdc-filled-button]="listBtn.isActive"
        [class.mat-mdc-raised-button]="!listBtn.isActive" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon>list</mat-icon>
        Listagem
      </a>
      <a matButton="filled" routerLink="/agendamento/criar" routerLinkActive #createBtn="routerLinkActive"
        [class.mat-mdc-filled-button]="createBtn.isActive" [class.mat-mdc-raised-button]="!createBtn.isActive"
        [routerLinkActiveOptions]="{exact: true}">
        <mat-icon>add_circle_outline</mat-icon>
        Novo Agendamento
      </a>
      <button mat-icon-button class="accent" (click)="themeService.toggleTheme()">
        <mat-icon>
          {{ themeService.darkModeActive ? 'light_mode' : 'dark_mode' }}
        </mat-icon>
      </button>
    </mat-toolbar-row>
  </mat-toolbar>

  <main class="content-container">
    <router-outlet></router-outlet>
  </main>
</section>
