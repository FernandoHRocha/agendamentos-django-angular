<h2 mat-dialog-title>Atenção</h2>
<mat-dialog-content>
  <p>Tem certeza que deseja excluir o agendamento?</p>
  <p>A ação é permanente e não pode ser revertida.</p>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onNoClick()" cdkFocusInitial>Não</button>
  <button matButton [mat-dialog-close]="true">Sim, excluir</button>
</mat-dialog-actions>
